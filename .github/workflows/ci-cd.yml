name: SmartBiz AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Compile TypeScript Verification
        run: |
          cd backend
          npm run build

      - name: Execute Unit Tests
        run: |
          cd backend
          npm run test

  build-docker:
    name: Verify Docker Container Build
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build -t smartbiz-backend -f docker/Dockerfile.backend backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t smartbiz-frontend -f docker/Dockerfile.frontend frontend
